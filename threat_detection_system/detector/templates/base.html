<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Cyber Security System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BODY */

body{
background: radial-gradient(circle at top,#02142a,#000814);
color:white;
font-family:'Segoe UI',sans-serif;
}


/* GLOBAL TEXT FIX */

h1,h2,h3,h4,h5,h6,label,p,span{
color:#00e6ff !important;
text-shadow:0 0 6px #00e6ff;
font-weight:500;
}


/* NAVBAR */

.navbar{
background:#020f20;
border-bottom:1px solid #00e6ff;
box-shadow:0 0 10px rgba(0,255,255,0.3);
}

.navbar-brand{
color:#00e6ff !important;
font-weight:bold;
}

.nav-link{
color:white !important;
margin-left:20px;
}

.nav-link:hover{
color:#00e6ff !important;
}


/* CYBER CARD */

.cyber-card{
background:#071a33;
border:1px solid #00e6ff;
box-shadow:0 0 15px rgba(0,255,255,0.15);
border-radius:12px;
}


/* CARD TITLES */

.card-title{
color:#7edfff !important;
font-size:14px;
}

.card-number{
font-size:32px;
font-weight:bold;
color:#00e6ff !important;
}

.threat-number{
color:#ff3b3b !important;
}

.safe-number{
color:#00ff9c !important;
}


/* TABLE */

.cyber-table{
width:100%;
color:white;
border-collapse:collapse;
}

.cyber-table th{
background:#0f2a44;
color:#00e6ff;
padding:12px;
border-bottom:1px solid #00e6ff;
}

.cyber-table td{
padding:10px;
border-bottom:1px solid rgba(0,255,255,0.1);
}

.log-row{
transition:all 0.3s ease;
}

.log-row:hover{
background:rgba(0,255,255,0.05);
transform:scale(1.01);
box-shadow:0 0 10px rgba(0,255,255,0.3);
}


/* STATUS BADGES */

.status-threat{
background:#ff3b3b;
padding:5px 12px;
border-radius:20px;
font-size:12px;
color:white !important;
box-shadow:0 0 8px red;
}

.status-safe{
background:#1aff8c;
padding:5px 12px;
border-radius:20px;
font-size:12px;
color:black !important;
box-shadow:0 0 8px #1aff8c;
}


/* FORM */

.form-control{
background:#061528;
border:1px solid #00e6ff;
color:white;
}

.form-control:focus{
background:#061528;
color:white;
border-color:#00e6ff;
box-shadow:none;
}

select.form-control{
background:#061528;
color:white;
}


/* BUTTON */

.btn-info{
background:#00e6ff;
border:none;
font-weight:bold;
}

.btn-info:hover{
background:#00bcd4;
}


/* ALERT */

.alert{
border-radius:10px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="/">🛡 AI Cyber Security System</a>

<div>

<a class="nav-link d-inline" href="/">Dashboard</a>
<a class="nav-link d-inline" href="/history/">Logs</a>
<a class="nav-link d-inline text-danger" href="/logout/">Logout</a>

</div>

</div>

</nav>

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

</body>

</html>
